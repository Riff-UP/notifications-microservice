services:
  notifications-db:
    image: mongo:6.0
    container_name: riff_notifications
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - ${MONGO_PORT}:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
    networks:
      - riff-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand({ ping: 1 })']
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ is provided by the shared central broker; do not create a local rabbit here.

  notifications-ms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riff_notifications_ms
    restart: always
    ports:
      - ${PORT}:${PORT}
    environment:
      - PORT=${PORT}
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@notifications-db:27017/${MONGO_DB_NAME}?authSource=admin
      - RABBIT_URL=amqp://guest:guest@central-rabbit:5672
      - RABBIT_EXCHANGE=${RABBIT_EXCHANGE:-riff_events}
      - RABBIT_QUEUE=${RABBIT_QUEUE:-notifications_queue}
      - RABBIT_BINDING_KEY=${RABBIT_BINDING_KEY:-#}
      - RESEND_KEY=${RESEND_KEY}
      - FRONT_URL=${FRONT_URL}
    depends_on:
      notifications-db:
        condition: service_healthy
    networks:
      - riff-network

volumes:
  mongo_data:

networks:
  riff-network:
    external: true
