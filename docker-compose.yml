version: '3.8'
services:
  notifications-mongo:
    image: mongo:6.0
    container_name: riff_notifications
    restart: always
    volumes:
      - ./mongo_data:/data/db
    ports:
      - ${MONGO_PORT}:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}